<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SixTiers - Perfil do Jogador</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        }

        body {
            background: #0a0000;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid rgba(255, 0, 0, 0.1);
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            cursor: pointer;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: #ff0000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 900;
            color: white;
        }

        .logo-text {
            font-size: 24px;
            font-weight: 700;
            color: white;
        }

        .logo-text span {
            color: #ff0000;
        }

        .back-btn {
            color: #666;
            text-decoration: none;
            font-size: 14px;
            padding: 8px 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            transition: all 0.3s;
        }

        .back-btn:hover {
            color: #ff0000;
            border-color: rgba(255, 0, 0, 0.3);
        }

        .profile-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 40px;
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 25px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff0000, #cc0000);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: 700;
            color: white;
            flex-shrink: 0;
        }

        .profile-info h1 {
            color: white;
            font-size: 28px;
            font-weight: 700;
        }

        .profile-info .discord-id {
            color: #666;
            font-size: 14px;
            margin-top: 4px;
        }

        .profile-info .updated {
            color: #444;
            font-size: 13px;
            margin-top: 6px;
        }

        .tiers-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .tier-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 14px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
        }

        .tier-item:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 0, 0, 0.15);
        }

        .tier-label {
            color: #666;
            font-size: 14px;
            font-weight: 500;
        }

        .tier-value {
            font-size: 18px;
            font-weight: 700;
            padding: 2px 14px;
            border-radius: 6px;
        }

        .tier-ht {
            color: #ff0000;
            background: rgba(255, 0, 0, 0.1);
        }

        .tier-lt {
            color: #ff6666;
            background: rgba(255, 100, 100, 0.08);
        }

        .tier-na {
            color: #333;
            background: transparent;
        }

        .not-found {
            text-align: center;
            padding: 80px 20px;
        }

        .not-found .big-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .not-found h2 {
            color: #ff3333;
            font-size: 24px;
            margin-bottom: 10px;
        }

        .not-found p {
            color: #444;
        }

        .loading {
            text-align: center;
            padding: 80px 20px;
            color: #444;
        }

        .loading-spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid rgba(255, 0, 0, 0.1);
            border-top: 3px solid #ff0000;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 600px) {
            .profile-header {
                flex-direction: column;
                text-align: center;
            }

            .tiers-grid {
                grid-template-columns: 1fr;
            }

            .header {
                flex-direction: column;
                align-items: stretch;
            }

            .back-btn {
                text-align: center;
            }

            .profile-card {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <a href="/" class="logo">
                <div class="logo-icon">6</div>
                <div class="logo-text">Six<span>Tiers</span></div>
            </a>
            <a class="back-btn" href="/">← Voltar ao ranking</a>
        </header>

        <div id="profileContent">
            <div class="loading">
                <div class="loading-spinner"></div>
                <div>Carregando perfil...</div>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // 🔥 CONFIGURAÇÕES DO SUPABASE (CORRETAS - COM JWT) 🔥
        // ============================================================
        const SUPABASE_URL = 'https://ucoqonyzmckwnktdtfrg.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVjb3Fvbnl6bWNrd25rdGR0ZnJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4MjA1NjksImV4cCI6MjA5NzM5NjU2OX0.fBdjaUjTROT2VV3zMVBZnp_sIsCrA0p8NDy7c2BuQRc';

        const username = window.location.pathname.split('/').pop();

        const categorias = [
            { key: 'overall_tier', label: '🏆 Overall' },
            { key: 'sword_tier', label: '⚔️ Sword' },
            { key: 'axe_tier', label: '🪓 Axe' },
            { key: 'crystal_tier', label: '💎 Crystal' },
            { key: 'elytra_tier', label: '🦅 Elytra' },
            { key: 'mace_tier', label: '🔨 Mace' },
            { key: 'ogv_tier', label: '⚡ OGV' },
            { key: 'trident_tier', label: '🔱 Trident' }
        ];

        async function loadProfile() {
            const content = document.getElementById('profileContent');

            try {
                const response = await fetch(
                    `${SUPABASE_URL}/rest/v1/players?minecraft_username=eq.${encodeURIComponent(username)}`,
                    {
                        headers: {
                            'apikey': SUPABASE_KEY,
                            'Authorization': `Bearer ${SUPABASE_KEY}`
                        }
                    }
                );

                if (!response.ok) throw new Error('Erro ao carregar');

                const data = await response.json();

                if (data.length === 0) {
                    content.innerHTML = `
                        <div class="not-found">
                            <div class="big-icon">😕</div>
                            <h2>Jogador não encontrado</h2>
                            <p>Verifique se o nome está correto</p>
                        </div>
                    `;
                    return;
                }

                const player = data[0];

                const getTierClass = (tier) => {
                    if (!tier) return 'tier-na';
                    if (tier.startsWith('HT')) return 'tier-ht';
                    if (tier.startsWith('LT')) return 'tier-lt';
                    return 'tier-na';
                };

                const getDisplayTier = (tier) => tier || '—';

                const tiersHTML = categorias.map(cat => `
                    <div class="tier-item">
                        <span class="tier-label">${cat.label}</span>
                        <span class="tier-value ${getTierClass(player[cat.key])}">
                            ${getDisplayTier(player[cat.key])}
                        </span>
                    </div>
                `).join('');

                const updatedAt = player.updated_at 
                    ? new Date(player.updated_at).toLocaleString('pt-BR') 
                    : 'Nunca';

                const initial = player.minecraft_username.charAt(0).toUpperCase();

                content.innerHTML = `
                    <div class="profile-card">
                        <div class="profile-header">
                            <div class="profile-avatar">${initial}</div>
                            <div class="profile-info">
                                <h1>${player.minecraft_username}</h1>
                                <div class="discord-id">Discord ID: ${player.discord_id}</div>
                                <div class="updated">🔄 Última atualização: ${updatedAt}</div>
                            </div>
                        </div>
                        <div class="tiers-grid">
                            ${tiersHTML}
                        </div>
                    </div>
                `;

            } catch (error) {
                console.error('Erro:', error);
                content.innerHTML = `
                    <div class="not-found">
                        <div class="big-icon">❌</div>
                        <h2>Erro ao carregar</h2>
                        <p>Tente novamente mais tarde</p>
                    </div>
                `;
            }
        }

        loadProfile();
    </script>
</body>
</html>
