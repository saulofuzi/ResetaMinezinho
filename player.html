<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SixTiers - Perfil do Jogador</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #0a0000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .container {
            max-width: 900px;
            width: 100%;
        }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid rgba(255, 0, 0, 0.15);
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
        }

        .logo-circle {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #ff0000, #cc0000);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 900;
            color: white;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.3);
        }

        .logo-text {
            font-size: 28px;
            font-weight: 800;
            color: #ff0000;
            letter-spacing: 1px;
        }

        .logo-text span {
            color: #882222;
            font-weight: 400;
        }

        .back-btn {
            color: #882222;
            text-decoration: none;
            font-size: 14px;
            padding: 8px 16px;
            border: 1px solid rgba(255, 0, 0, 0.15);
            border-radius: 8px;
            transition: all 0.3s;
        }

        .back-btn:hover {
            color: #ff0000;
            border-color: #ff0000;
        }

        /* ===== PERFIL ===== */
        .profile-card {
            background: rgba(20, 0, 0, 0.6);
            border: 1px solid rgba(255, 0, 0, 0.1);
            border-radius: 16px;
            padding: 40px;
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 25px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff0000, #cc0000);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: 700;
            color: white;
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.2);
        }

        .profile-info h1 {
            color: white;
            font-size: 28px;
        }

        .profile-info .discord-id {
            color: #882222;
            font-size: 14px;
        }

        .profile-info .updated {
            color: #552222;
            font-size: 13px;
            margin-top: 5px;
        }

        /* ===== TIERS ===== */
        .tiers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
        }

        .tier-item {
            background: rgba(255, 0, 0, 0.03);
            border: 1px solid rgba(255, 0, 0, 0.08);
            border-radius: 10px;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
        }

        .tier-item:hover {
            background: rgba(255, 0, 0, 0.05);
            border-color: rgba(255, 0, 0, 0.2);
        }

        .tier-label {
            color: #882222;
            font-size: 14px;
            font-weight: 600;
        }

        .tier-value {
            font-size: 20px;
            font-weight: 700;
            padding: 2px 14px;
            border-radius: 6px;
        }

        .tier-ht {
            color: #ff0000;
            background: rgba(255, 0, 0, 0.1);
        }

        .tier-lt {
            color: #ff6666;
            background: rgba(255, 100, 100, 0.08);
        }

        .tier-na {
            color: #442222;
            background: rgba(255, 255, 255, 0.02);
        }

        .not-found {
            text-align: center;
            padding: 60px 20px;
            color: #882222;
        }

        .not-found .big-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .not-found h2 {
            color: #ff3333;
            margin-bottom: 10px;
        }

        @media (max-width: 600px) {
            .profile-header {
                flex-direction: column;
                text-align: center;
            }

            .tiers-grid {
                grid-template-columns: 1fr 1fr;
            }

            .header {
                flex-direction: column;
                align-items: stretch;
            }

            .back-btn {
                text-align: center;
            }
        }

        @media (max-width: 400px) {
            .tiers-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <header class="header">
            <div class="logo-area" onclick="window.location.href='/'">
                <div class="logo-circle">6</div>
                <div class="logo-text">Six<span>Tiers</span></div>
            </div>
            <a class="back-btn" href="/">← Voltar ao ranking</a>
        </header>

        <!-- CONTEÚDO -->
        <div id="profileContent">
            <div style="text-align:center;color:#552222;padding:40px;">Carregando perfil...</div>
        </div>
    </div>

    <script>
        // ===== CONFIGURAÇÕES =====
        const SUPABASE_URL = 'https://ucoqonyzmckwnktdtfrg.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_AF-JxbMWdy5bxLDQcFdVaA_rmfuk...';

        const username = window.location.pathname.split('/').pop();

        // ===== CATEGORIAS =====
        const categorias = [
            { key: 'overall_tier', label: '🏆 Overall' },
            { key: 'sword_tier', label: '⚔️ Sword' },
            { key: 'axe_tier', label: '🪓 Axe' },
            { key: 'crystal_tier', label: '💎 Crystal' },
            { key: 'elytra_tier', label: '🦅 Elytra' },
            { key: 'mace_tier', label: '🔨 Mace' },
            { key: 'ogv_tier', label: '⚡ OGV' },
            { key: 'trident_tier', label: '🔱 Trident' }
        ];

        // ===== CARREGAR PERFIL =====
        async function loadProfile() {
            const content = document.getElementById('profileContent');

            try {
                const response = await fetch(
                    `${SUPABASE_URL}/rest/v1/players?minecraft_username=eq.${encodeURIComponent(username)}`,
                    {
                        headers: {
                            'apikey': SUPABASE_KEY,
                            'Authorization': `Bearer ${SUPABASE_KEY}`
                        }
                    }
                );

                if (!response.ok) throw new Error('Erro ao carregar');

                const data = await response.json();

                if (data.length === 0) {
                    content.innerHTML = `
                        <div class="not-found">
                            <div class="big-icon">😕</div>
                            <h2>Jogador não encontrado</h2>
                            <p>Verifique se o nome está correto</p>
                        </div>
                    `;
                    return;
                }

                const player = data[0];

                const getTierClass = (tier) => {
                    if (!tier) return 'tier-na';
                    if (tier.startsWith('HT')) return 'tier-ht';
                    if (tier.startsWith('LT')) return 'tier-lt';
                    return 'tier-na';
                };

                const getDisplayTier = (tier) => tier || 'N/A';

                const tiersHTML = categorias.map(cat => `
                    <div class="tier-item">
                        <span class="tier-label">${cat.label}</span>
                        <span class="tier-value ${getTierClass(player[cat.key])}">
                            ${getDisplayTier(player[cat.key])}
                        </span>
                    </div>
                `).join('');

                const updatedAt = player.updated_at 
                    ? new Date(player.updated_at).toLocaleString('pt-BR') 
                    : 'Nunca';

                const initial = player.minecraft_username.charAt(0).toUpperCase();

                content.innerHTML = `
                    <div class="profile-card">
                        <div class="profile-header">
                            <div class="profile-avatar">${initial}</div>
                            <div class="profile-info">
                                <h1>${player.minecraft_username}</h1>
                                <div class="discord-id">ID: ${player.discord_id}</div>
                                <div class="updated">🔄 Última atualização: ${updatedAt}</div>
                            </div>
                        </div>
                        <div class="tiers-grid">
                            ${tiersHTML}
                        </div>
                    </div>
                `;

            } catch (error) {
                console.error('Erro:', error);
                content.innerHTML = `
                    <div class="not-found">
                        <div class="big-icon">❌</div>
                        <h2>Erro ao carregar</h2>
                        <p>Tente novamente mais tarde</p>
                    </div>
                `;
            }
        }

        loadProfile();
    </script>
</body>
</html>
