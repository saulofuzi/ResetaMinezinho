<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SixTiers - Perfil do Jogador</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        }

        body {
            background: #0a0000;
            min-height: 100vh;
            padding: 20px;
            color: white;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid rgba(255, 0, 0, 0.1);
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: #ff0000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 900;
            color: white;
        }

        .logo-text {
            font-size: 24px;
            font-weight: 700;
            color: white;
        }

        .logo-text span {
            color: #ff0000;
        }

        .back-btn {
            color: #666;
            text-decoration: none;
            font-size: 14px;
            padding: 8px 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            transition: all 0.3s;
        }

        .back-btn:hover {
            color: #ff0000;
            border-color: rgba(255, 0, 0, 0.3);
        }

        .profile-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 40px;
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 30px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border: 3px solid rgba(255, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
            position: relative;
        }

        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-avatar .fallback {
            font-size: 40px;
            font-weight: 700;
            color: #666;
        }

        .profile-info h1 {
            color: white;
            font-size: 32px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .profile-info h1 .points-badge {
            font-size: 18px;
            color: #ff0000;
            background: rgba(255, 0, 0, 0.1);
            padding: 4px 16px;
            border-radius: 20px;
            border: 1px solid rgba(255, 0, 0, 0.2);
        }

        .profile-info .discord-id {
            color: #666;
            font-size: 14px;
            margin-top: 4px;
        }

        .profile-info .updated {
            color: #444;
            font-size: 13px;
            margin-top: 6px;
        }

        .profile-stats {
            display: flex;
            gap: 30px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .profile-stats .stat {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #888;
            font-size: 14px;
        }

        .profile-stats .stat span {
            color: white;
            font-weight: 600;
        }

        .tiers-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }

        .tier-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 14px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
        }

        .tier-item:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 0, 0, 0.15);
        }

        .tier-item .points-info {
            font-size: 11px;
            color: #444;
            margin-left: 4px;
        }

        .tier-label {
            color: #666;
            font-size: 13px;
            font-weight: 500;
        }

        .tier-value {
            font-size: 18px;
            font-weight: 700;
            padding: 2px 14px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tier-value .points-info {
            font-size: 11px;
            color: #444;
            font-weight: 400;
        }

        .tier-ht {
            color: #ff0000;
            background: rgba(255, 0, 0, 0.1);
        }

        .tier-lt {
            color: #ff6666;
            background: rgba(255, 100, 100, 0.08);
        }

        .tier-na {
            color: #333;
            background: transparent;
        }

        .not-found {
            text-align: center;
            padding: 80px 20px;
        }

        .not-found .big-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .not-found h2 {
            color: #ff3333;
            font-size: 24px;
            margin-bottom: 10px;
        }

        .not-found p {
            color: #444;
        }

        .loading {
            text-align: center;
            padding: 80px 20px;
            color: #444;
        }

        .loading-spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid rgba(255, 0, 0, 0.1);
            border-top: 3px solid #ff0000;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .tiers-grid {
                grid-template-columns: 1fr 1fr;
            }

            .profile-header {
                flex-direction: column;
                text-align: center;
            }

            .profile-stats {
                justify-content: center;
            }

            .header {
                flex-direction: column;
                align-items: stretch;
            }

            .back-btn {
                text-align: center;
            }

            .profile-card {
                padding: 20px;
            }

            .profile-info h1 {
                flex-direction: column;
                gap: 8px;
                align-items: center;
            }
        }

        @media (max-width: 480px) {
            .tiers-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <a href="/" class="logo">
                <div class="logo-icon">6</div>
                <div class="logo-text">Six<span>Tiers</span></div>
            </a>
            <a class="back-btn" href="/">← Voltar ao ranking</a>
        </header>

        <div id="profileContent">
            <div class="loading">
                <div class="loading-spinner"></div>
                <div>Carregando perfil...</div>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // 🔥 CONFIGURAÇÕES 🔥
        // ============================================================
        const SUPABASE_URL = 'https://ucoqonyzmckwnktdtfrg.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_AF-JxbMVdy5bxlDQcFdVaA_rmfuk8bj';

        const username = window.location.pathname.split('/').pop();

        // ============================================================
        // 🔥 SISTEMA DE PONTOS 🔥
        // ============================================================
        const TIER_POINTS = {
            'LT5': 1,
            'HT5': 2,
            'LT4': 3,
            'HT4': 4,
            'LT3': 6,
            'HT3': 8,
            'LT2': 10,
            'HT2': 12,
            'LT1': 15,
            'HT1': 20
        };

        function getTierPoints(tier) {
            if (!tier) return 0;
            return TIER_POINTS[tier.toUpperCase()] || 0;
        }

        function calculateOverallPoints(player) {
            const categories = [
                'overall_tier', 'sword_tier', 'axe_tier', 'crystal_tier',
                'elytra_tier', 'mace_tier', 'ogv_tier', 'trident_tier'
            ];
            
            let total = 0;
            categories.forEach(cat => {
                const tier = player[cat];
                if (tier) {
                    total += getTierPoints(tier);
                }
            });
            return total;
        }

        const categorias = [
            { key: 'overall_tier', label: '🏆 Overall' },
            { key: 'sword_tier', label: '⚔️ Sword' },
            { key: 'axe_tier', label: '🪓 Axe' },
            { key: 'crystal_tier', label: '💎 Crystal' },
            { key: 'elytra_tier', label: '🦅 Elytra' },
            { key: 'mace_tier', label: '🔨 Mace' },
            { key: 'ogv_tier', label: '⚡ OGV' },
            { key: 'trident_tier', label: '🔱 Trident' }
        ];

        async function loadProfile() {
            const content = document.getElementById('profileContent');

            try {
                const response = await fetch(
                    `${SUPABASE_URL}/rest/v1/players?minecraft_username=eq.${encodeURIComponent(username)}`,
                    {
                        headers: {
                            'apikey': SUPABASE_KEY,
                            'Authorization': `Bearer ${SUPABASE_KEY}`
                        }
                    }
                );

                if (!response.ok) throw new Error('Erro ao carregar');

                const data = await response.json();

                if (data.length === 0) {
                    content.innerHTML = `
                        <div class="not-found">
                            <div class="big-icon">😕</div>
                            <h2>Jogador não encontrado</h2>
                            <p>Verifique se o nome está correto</p>
                        </div>
                    `;
                    return;
                }

                const player = data[0];
                const mcUsername = player.minecraft_username;

                // Usa a skin_url do banco ou fallback
                const skinUrl = player.skin_url || `https://crafatar.com/avatars/${mcUsername}?overlay&size=100`;

                // Calcula os pontos
                const totalPoints = calculateOverallPoints(player);
                const totalTiers = categorias.filter(cat => player[cat.key]).length;

                const getTierClass = (tier) => {
                    if (!tier) return 'tier-na';
                    if (tier.startsWith('HT')) return 'tier-ht';
                    if (tier.startsWith('LT')) return 'tier-lt';
                    return 'tier-na';
                };

                const getDisplayTier = (tier) => tier || '—';

                const tiersHTML = categorias.map(cat => {
                    const tier = player[cat.key];
                    const points = getTierPoints(tier);
                    const pointsDisplay = points > 0 ? `<span class="points-info">+${points}pts</span>` : '';
                    
                    return `
                        <div class="tier-item">
                            <span class="tier-label">${cat.label}</span>
                            <span class="tier-value ${getTierClass(tier)}">
                                ${getDisplayTier(tier)}
                                ${pointsDisplay}
                            </span>
                        </div>
                    `;
                }).join('');

                const updatedAt = player.updated_at 
                    ? new Date(player.updated_at).toLocaleString('pt-BR') 
                    : 'Nunca';

                const initial = mcUsername.charAt(0).toUpperCase();

                content.innerHTML = `
                    <div class="profile-card">
                        <div class="profile-header">
                            <div class="profile-avatar">
                                <img src="${skinUrl}" 
                                     alt="${mcUsername}" 
                                     onerror="this.style.display='none';this.parentElement.innerHTML='<span class=\\'fallback\\'>${initial}</span>'">
                            </div>
                            <div class="profile-info">
                                <h1>
                                    ${mcUsername}
                                    <span class="points-badge">🏆 ${totalPoints} pts</span>
                                </h1>
                                <div class="discord-id">Discord ID: ${player.discord_id}</div>
                                <div class="updated">🔄 Última atualização: ${updatedAt}</div>
                                <div class="profile-stats">
                                    <div class="stat">📊 <span>${totalTiers}</span> tiers registrados</div>
                                    <div class="stat">⭐ <span>${categorias.length}</span> categorias</div>
                                </div>
                            </div>
                        </div>
                        <div class="tiers-grid">
                            ${tiersHTML}
                        </div>
                    </div>
                `;

            } catch (error) {
                console.error('Erro:', error);
                content.innerHTML = `
                    <div class="not-found">
                        <div class="big-icon">❌</div>
                        <h2>Erro ao carregar</h2>
                        <p>Tente novamente mais tarde</p>
                    </div>
                `;
            }
        }

        loadProfile();
    </script>
</body>
</html>
