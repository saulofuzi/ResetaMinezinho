<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SixTiers - Minecraft Tier List</title>
    <style>
        /* ===== RESET ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        }

        body {
            background: #0a0000;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid rgba(255, 0, 0, 0.1);
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: #ff0000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 900;
            color: white;
        }

        .logo-text {
            font-size: 24px;
            font-weight: 700;
            color: white;
        }

        .logo-text span {
            color: #ff0000;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .search-box {
            position: relative;
        }

        .search-box input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 10px 16px;
            color: white;
            font-size: 14px;
            width: 250px;
            outline: none;
            transition: all 0.3s;
        }

        .search-box input::placeholder {
            color: #666;
        }

        .search-box input:focus {
            border-color: #ff0000;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.1);
        }

        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #ff0000;
            font-size: 14px;
            font-weight: 500;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #ff0000;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        /* ===== CATEGORIAS ===== */
        .categories {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .category-btn {
            background: transparent;
            border: none;
            color: #666;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .category-btn:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.05);
        }

        .category-btn.active {
            color: #ff0000;
            background: rgba(255, 0, 0, 0.1);
        }

        /* ===== RANKING ===== */
        .ranking-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .ranking-title {
            font-size: 20px;
            font-weight: 700;
            color: white;
        }

        .ranking-title small {
            color: #666;
            font-weight: 400;
            font-size: 14px;
        }

        /* ===== PLAYER CARD ===== */
        .player-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 8px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .player-card:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 0, 0, 0.2);
            transform: translateX(4px);
        }

        .player-position {
            font-size: 18px;
            font-weight: 700;
            color: #444;
            min-width: 40px;
        }

        .player-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff0000, #cc0000);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 700;
            color: white;
            flex-shrink: 0;
        }

        .player-info {
            flex: 1;
            min-width: 0;
        }

        .player-name {
            font-size: 16px;
            font-weight: 600;
            color: white;
        }

        .player-name small {
            color: #666;
            font-weight: 400;
            font-size: 13px;
            margin-left: 8px;
        }

        .player-time {
            color: #444;
            font-size: 12px;
            margin-top: 2px;
        }

        .player-tiers {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            flex-shrink: 0;
        }

        .tier-badge {
            padding: 2px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.3px;
        }

        .tier-ht {
            background: rgba(255, 0, 0, 0.15);
            color: #ff0000;
            border: 1px solid rgba(255, 0, 0, 0.15);
        }

        .tier-lt {
            background: rgba(255, 100, 100, 0.1);
            color: #ff6666;
            border: 1px solid rgba(255, 100, 100, 0.1);
        }

        .tier-empty {
            color: #333;
            font-size: 12px;
        }

        /* ===== LOADING ===== */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #444;
        }

        .loading-spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid rgba(255, 0, 0, 0.1);
            border-top: 3px solid #ff0000;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ===== RESPONSIVO ===== */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                align-items: stretch;
            }

            .header-right {
                flex-wrap: wrap;
            }

            .search-box input {
                width: 100%;
            }

            .player-card {
                flex-wrap: wrap;
                gap: 10px;
            }

            .player-tiers {
                width: 100%;
                justify-content: flex-start;
                padding-left: 56px;
            }
        }

        @media (max-width: 480px) {
            .categories {
                justify-content: center;
            }
            
            .category-btn {
                font-size: 12px;
                padding: 6px 14px;
            }

            .player-position {
                min-width: 30px;
                font-size: 14px;
            }

            .player-name {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <header class="header">
            <a href="/" class="logo">
                <div class="logo-icon">6</div>
                <div class="logo-text">Six<span>Tiers</span></div>
            </a>
            <div class="header-right">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Buscar jogador..." onkeypress="if(event.key==='Enter')searchPlayer()">
                </div>
                <div class="status">
                    <span class="status-dot"></span>
                    Online
                </div>
            </div>
        </header>

        <!-- CATEGORIAS -->
        <nav class="categories" id="categories">
            <button class="category-btn active" data-cat="overall">🏆 Overall</button>
            <button class="category-btn" data-cat="sword">⚔️ Sword</button>
            <button class="category-btn" data-cat="axe">🪓 Axe</button>
            <button class="category-btn" data-cat="crystal">💎 Crystal</button>
            <button class="category-btn" data-cat="elytra">🦅 Elytra</button>
            <button class="category-btn" data-cat="mace">🔨 Mace</button>
            <button class="category-btn" data-cat="ogv">⚡ OGV</button>
            <button class="category-btn" data-cat="trident">🔱 Trident</button>
        </nav>

        <!-- RANKING -->
        <div class="ranking-header">
            <div class="ranking-title">Ranking <small>— Top jogadores</small></div>
        </div>

        <div id="rankingList">
            <div class="loading">
                <div class="loading-spinner"></div>
                <div>Carregando ranking...</div>
            </div>
        </div>
    </div>

    <script>
        // ===== CONFIGURAÇÕES =====
        const SUPABASE_URL = 'https://ucoqonyzmckwnktdtfrg.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_AF-JxbMWdy5bxLDQcFdVaA_rmfuk...'; // ← TROQUE PELA SUA CHAVE COMPLETA

        let currentCategory = 'overall_tier';

        // ===== BUSCAR JOGADOR =====
        function searchPlayer() {
            const username = document.getElementById('searchInput').value.trim();
            if (username) {
                window.location.href = `/player/${username}`;
            }
        }

        // ===== TEMPO DECORRIDO =====
        function timeSince(date) {
            const now = new Date();
            const diff = Math.floor((now - date) / 1000);
            
            if (diff < 60) return 'agora mesmo';
            if (diff < 3600) return `${Math.floor(diff / 60)}min atrás`;
            if (diff < 86400) return `${Math.floor(diff / 3600)}h atrás`;
            if (diff < 2592000) return `${Math.floor(diff / 86400)}d atrás`;
            if (diff < 31536000) return `${Math.floor(diff / 2592000)}m atrás`;
            return `${Math.floor(diff / 31536000)}a atrás`;
        }

        // ===== CARREGAR RANKING =====
        async function loadRanking(category) {
            const list = document.getElementById('rankingList');
            list.innerHTML = `
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <div>Carregando ranking...</div>
                </div>
            `;

            try {
                const response = await fetch(
                    `${SUPABASE_URL}/rest/v1/players?select=*&limit=100`,
                    {
                        headers: {
                            'apikey': SUPABASE_KEY,
                            'Authorization': `Bearer ${SUPABASE_KEY}`
                        }
                    }
                );

                if (!response.ok) throw new Error('Erro ao carregar');

                const data = await response.json();

                // Filtra quem tem tier na categoria
                const filtered = data.filter(p => p[category] !== null && p[category] !== undefined);
                
                if (filtered.length === 0) {
                    list.innerHTML = `
                        <div style="text-align:center;padding:60px 20px;color:#444;">
                            <div style="font-size:48px;margin-bottom:15px;">📭</div>
                            <p>Nenhum tier registrado nesta categoria ainda.</p>
                        </div>
                    `;
                    return;
                }

                // Ordena: HT > LT, e dentro de cada, maior número primeiro
                filtered.sort((a, b) => {
                    const tierA = a[category] || '';
                    const tierB = b[category] || '';
                    
                    const getWeight = (tier) => {
                        if (!tier) return 0;
                        const num = parseInt(tier.match(/\d+/)?.[0] || 0);
                        const isHT = tier.startsWith('HT');
                        return isHT ? (100 + num) : num;
                    };
                    
                    return getWeight(tierB) - getWeight(tierA);
                });

                // Top 20
                const top = filtered.slice(0, 20);

                // Todas as categorias para exibir nos badges
                const allCats = [
                    { key: 'overall_tier', label: 'Overall' },
                    { key: 'sword_tier', label: 'Sword' },
                    { key: 'axe_tier', label: 'Axe' },
                    { key: 'crystal_tier', label: 'Crystal' },
                    { key: 'elytra_tier', label: 'Elytra' },
                    { key: 'mace_tier', label: 'Mace' },
                    { key: 'ogv_tier', label: 'OGV' },
                    { key: 'trident_tier', label: 'Trident' }
                ];

                list.innerHTML = top.map((player, index) => {
                    // Pega todos os tiers do jogador
                    const tiersHTML = allCats.map(cat => {
                        const tier = player[cat.key];
                        if (!tier) return '';
                        const cls = tier.startsWith('HT') ? 'tier-ht' : 'tier-lt';
                        return `<span class="tier-badge ${cls}">${tier}</span>`;
                    }).filter(Boolean).join('');

                    const timeAgo = player.updated_at ? timeSince(new Date(player.updated_at)) : 'Nunca';
                    const initial = player.minecraft_username.charAt(0).toUpperCase();

                    return `
                        <div class="player-card" onclick="window.location.href='/player/${player.minecraft_username}'">
                            <div class="player-position">#${index + 1}</div>
                            <div class="player-avatar">${initial}</div>
                            <div class="player-info">
                                <div class="player-name">${player.minecraft_username} <small>${player.discord_id}</small></div>
                                <div class="player-time">🕐 ${timeAgo}</div>
                            </div>
                            <div class="player-tiers">
                                ${tiersHTML || '<span class="tier-empty">Sem tiers</span>'}
                            </div>
                        </div>
                    `;
                }).join('');

            } catch (error) {
                console.error('Erro:', error);
                list.innerHTML = `
                    <div style="text-align:center;padding:60px 20px;color:#ff3333;">
                        <div style="font-size:48px;margin-bottom:15px;">❌</div>
                        <p>Erro ao carregar ranking. Tente novamente.</p>
                    </div>
                `;
            }
        }

        // ===== EVENTOS DAS CATEGORIAS =====
        document.querySelectorAll('.category-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                
                const catMap = {
                    'overall': 'overall_tier',
                    'sword': 'sword_tier',
                    'axe': 'axe_tier',
                    'crystal': 'crystal_tier',
                    'elytra': 'elytra_tier',
                    'mace': 'mace_tier',
                    'ogv': 'ogv_tier',
                    'trident': 'trident_tier'
                };
                currentCategory = catMap[this.dataset.cat] || 'overall_tier';
                loadRanking(currentCategory);
            });
        });

        // ===== INICIALIZA =====
        loadRanking('overall_tier');
    </script>
</body>
</html>
