<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SixStore - Sua Loja Gamer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* HEADER */
        header {
            border-bottom: 1px solid #222;
            padding: 20px 0;
            position: sticky;
            top: 0;
            background: #0a0a0a;
            z-index: 100;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 3px;
            color: #fff;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: #fff;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #0a0a0a;
            font-weight: 900;
        }

        .cart-icon {
            font-size: 24px;
            cursor: pointer;
            position: relative;
        }

        .cart-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #fff;
            color: #0a0a0a;
            font-size: 11px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        /* HERO */
        .hero {
            text-align: center;
            padding: 60px 0 40px;
        }

        .hero h1 {
            font-size: 48px;
            font-weight: 900;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .hero p {
            color: #999;
            font-size: 18px;
            letter-spacing: 1px;
        }

        /* CATEGORIES */
        .categories {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 40px;
        }

        .cat-btn {
            padding: 10px 20px;
            border: 1px solid #333;
            background: transparent;
            color: #fff;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .cat-btn:hover, .cat-btn.active {
            background: #fff;
            color: #0a0a0a;
            border-color: #fff;
        }

        /* PRODUCTS GRID */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 60px;
        }

        .product-card {
            border: 1px solid #222;
            padding: 25px;
            text-align: center;
            transition: all 0.3s;
            position: relative;
            background: #0f0f0f;
        }

        .product-card:hover {
            border-color: #fff;
            transform: translateY(-5px);
        }

        .product-emoji {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .product-name {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .product-desc {
            color: #777;
            font-size: 13px;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .product-price {
            font-size: 24px;
            font-weight: 900;
            margin-bottom: 15px;
        }

        .product-price span {
            font-size: 14px;
            color: #777;
        }

        .btn-buy {
            width: 100%;
            padding: 12px;
            background: #fff;
            color: #0a0a0a;
            border: none;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s;
        }

        .btn-buy:hover {
            background: #ddd;
            letter-spacing: 3px;
        }

        .badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #fff;
            color: #0a0a0a;
            font-size: 10px;
            padding: 4px 8px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #0f0f0f;
            border: 1px solid #333;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            text-align: center;
        }

        .modal h2 {
            font-size: 28px;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .modal .price {
            font-size: 36px;
            font-weight: 900;
            margin: 20px 0;
        }

        .payment-options {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 25px;
        }

        .payment-btn {
            padding: 15px;
            border: 1px solid #333;
            background: transparent;
            color: #fff;
            cursor: pointer;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 1px;
            transition: all 0.3s;
        }

        .payment-btn.evopay {
            background: #fff;
            color: #0a0a0a;
            border-color: #fff;
        }

        .payment-btn.evopay:hover {
            background: #ddd;
        }

        .payment-btn.pix {
            border-color: #fff;
        }

        .payment-btn.pix:hover {
            background: #fff;
            color: #0a0a0a;
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 28px;
            cursor: pointer;
            color: #fff;
        }

        /* FOOTER */
        footer {
            border-top: 1px solid #222;
            padding: 30px 0;
            text-align: center;
            color: #555;
            font-size: 13px;
            letter-spacing: 2px;
        }

        .pix-section {
            display: none;
            margin-top: 20px;
            padding: 20px;
            border: 1px solid #333;
        }

        .pix-section.active {
            display: block;
        }

        .pix-key {
            background: #1a1a1a;
            padding: 15px;
            margin: 15px 0;
            word-break: break-all;
            font-size: 14px;
            border: 1px solid #333;
            cursor: pointer;
        }

        .copied {
            color: #0f0;
            font-size: 12px;
            display: none;
        }

        .copied.show {
            display: block;
        }

        @media (max-width: 768px) {
            .hero h1 {
                font-size: 32px;
            }
            .products-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header>
        <div class="container header-content">
            <a href="#" class="logo">
                <div class="logo-icon">S</div>
                SIXSTORE
            </a>
            <div class="cart-icon" onclick="toggleCart()">
                🛒
                <span class="cart-count" id="cartCount">0</span>
            </div>
        </div>
    </header>

    <!-- HERO -->
    <section class="hero">
        <div class="container">
            <h1>SIXSTORE</h1>
            <p>SUA LOJA GAMER DE CONFIANÇA</p>
        </div>
    </section>

    <!-- CATEGORIES -->
    <div class="container">
        <div class="categories">
            <button class="cat-btn active" onclick="filterProducts('all')">TODOS</button>
            <button class="cat-btn" onclick="filterProducts('instagram')">📱 Instagram</button>
            <button class="cat-btn" onclick="filterProducts('discord')">💎 Discord</button>
            <button class="cat-btn" onclick="filterProducts('steam')">🎮 Steam</button>
            <button class="cat-btn" onclick="filterProducts('contas')">👤 Contas</button>
            <button class="cat-btn" onclick="filterProducts('robux')">🤖 Roblox</button>
            <button class="cat-btn" onclick="filterProducts('streaming')">📺 Streaming</button>
        </div>
    </div>

    <!-- PRODUCTS -->
    <div class="container">
        <div class="products-grid" id="productsGrid"></div>
    </div>

    <!-- MODAL -->
    <div class="modal" id="paymentModal">
        <div class="modal-content" style="position: relative;">
            <span class="close-modal" onclick="closeModal()">✕</span>
            <h2 id="modalProduct"></h2>
            <div class="price" id="modalPrice"></div>
            <div class="payment-options">
                <button class="payment-btn evopay" onclick="payWithEvoPay()">
                    💳 PAGAR COM EVOPAY
                </button>
                <button class="payment-btn pix" onclick="showPix()">
                    📱 PAGAR COM PIX
                </button>
            </div>
            <div class="pix-section" id="pixSection">
                <p style="color: #999; font-size: 14px;">Chave Pix (CPF):</p>
                <div class="pix-key" onclick="copyPix()" id="pixKey">
                    703.211.011-89
                </div>
                <span class="copied" id="copiedMsg">✅ Chave copiada!</span>
                <p style="color: #777; font-size: 12px; margin-top: 10px;">
                    Após o pagamento, envie o comprovante no Discord
                </p>
            </div>
        </div>
    </div>

    <!-- FOOTER -->
    <footer>
        <div class="container">
            SIXSTORE © 2025 - TODOS OS DIREITOS RESERVADOS
        </div>
    </footer>

    <script>
        // Seus produtos
        const products = [
            { id: 1, name: "1000 Seguidores", cat: "instagram", emoji: "📱", desc: "Seguidores reais Instagram", price: 25, type: "Instagram" },
            { id: 2, name: "5000 Likes", cat: "instagram", emoji: "❤️", desc: "Likes para posts", price: 15, type: "Instagram" },
            { id: 3, name: "10K Visualizações", cat: "instagram", emoji: "👁️", desc: "Views Stories/Reels", price: 20, type: "Instagram" },
            { id: 4, name: "Discord Nitro Basic", cat: "discord", emoji: "💎", desc: "1 mês Nitro Basic", price: 15, type: "Discord" },
            { id: 5, name: "Discord Nitro Boost", cat: "discord", emoji: "🚀", desc: "1 mês Nitro Full", price: 45, type: "Discord" },
            { id: 6, name: "Jogo Steam R$30", cat: "steam", emoji: "🎮", desc: "Crédito Steam via gift", price: 25, type: "Steam" },
            { id: 7, name: "Jogo Steam R$50", cat: "steam", emoji: "🎮", desc: "Crédito Steam via gift", price: 40, type: "Steam" },
            { id: 8, name: "Jogo Steam R$100", cat: "steam", emoji: "🎮", desc: "Crédito Steam via gift", price: 80, type: "Steam" },
            { id: 9, name: "Conta Minecraft", cat: "contas", emoji: "⛏️", desc: "Conta original + email", price: 35, type: "Contas" },
            { id: 10, name: "Conta VALORANT", cat: "contas", emoji: "🔫", desc: "Com skins - Bronze ao Radiante", price: 50, type: "Contas" },
            { id: 11, name: "Conta Free Fire", cat: "contas", emoji: "🔥", desc: "Com diamantes e skins", price: 40, type: "Contas" },
            { id: 12, name: "XIT Minecraft", cat: "contas", emoji: "⛏️", desc: "Client premium undetect", price: 60, type: "Contas" },
            { id: 13, name: "XIT VALORANT", cat: "contas", emoji: "🎯", desc: "Aimbot + WH undetect", price: 80, type: "Contas" },
            { id: 14, name: "XIT Free Fire", cat: "contas", emoji: "🔥", desc: "Macro + Aimbot", price: 45, type: "Contas" },
            { id: 15, name: "1000 Robux", cat: "robux", emoji: "🤖", desc: "Robux via gift card", price: 30, type: "Roblox" },
            { id: 16, name: "5000 Robux", cat: "robux", emoji: "🤖", desc: "Robux via gift card", price: 120, type: "Roblox" },
            { id: 17, name: "Netflix 1 mês", cat: "streaming", emoji: "📺", desc: "Conta compartilhada", price: 15, type: "Streaming" },
            { id: 18, name: "Spotify Premium", cat: "streaming", emoji: "🎵", desc: "3 meses garantidos", price: 20, type: "Streaming" },
            { id: 19, name: "Prime Video", cat: "streaming", emoji: "🎬", desc: "1 mês de acesso", price: 12, type: "Streaming" },
            { id: 20, name: "HBO Max", cat: "streaming", emoji: "🍿", desc: "1 mês de acesso", price: 15, type: "Streaming" },
        ];

        let cart = [];
        let currentProduct = null;
        let currentFilter = 'all';

        // EVOPAY TOKEN
        const EVOPAY_TOKEN = 'SEU_TOKEN_AQUI'; // Vou configurar depois

        // Renderizar produtos
        function renderProducts(filter = 'all') {
            const grid = document.getElementById('productsGrid');
            const filtered = filter === 'all' ? products : products.filter(p => p.cat === filter);

            grid.innerHTML = filtered.map(p => `
                <div class="product-card">
                    <span class="badge">${p.type}</span>
                    <div class="product-emoji">${p.emoji}</div>
                    <div class="product-name">${p.name}</div>
                    <div class="product-desc">${p.desc}</div>
                    <div class="product-price">R$ ${p.price}<span>,00</span></div>
                    <button class="btn-buy" onclick="buyProduct(${p.id})">COMPRAR AGORA</button>
                </div>
            `).join('');

            currentFilter = filter;
        }

        // Filtrar produtos
        function filterProducts(cat) {
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderProducts(cat);
        }

        // Comprar produto
        function buyProduct(id) {
            currentProduct = products.find(p => p.id === id);
            document.getElementById('modalProduct').textContent = currentProduct.name;
            document.getElementById('modalPrice').innerHTML = `R$ ${currentProduct.price}<span>,00</span>`;
            document.getElementById('paymentModal').classList.add('active');
            document.getElementById('pixSection').classList.remove('active');
        }

        // Fechar modal
        function closeModal() {
            document.getElementById('paymentModal').classList.remove('active');
            currentProduct = null;
        }

        // Pagar com EvoPay
        function payWithEvoPay() {
            if (!currentProduct) return;

            // Criar pagamento na EvoPay
            fetch('https://api.evopay.com/v1/payment', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${EVOPAY_TOKEN}`
                },
                body: JSON.stringify({
                    amount: currentProduct.price,
                    currency: 'BRL',
                    description: currentProduct.name,
                    redirectUrl: window.location.href + '?success=true'
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.paymentUrl) {
                    window.location.href = data.paymentUrl;
                } else {
                    alert('Link de pagamento gerado! Redirecionando...');
                    // Fallback: abrir link direto da EvoPay
                    window.open('https://pay.evopay.com/' + EVOPAY_TOKEN, '_blank');
                }
            })
            .catch(error => {
                console.error('Erro:', error);
                alert('Erro ao processar pagamento. Tente novamente.');
            });
        }

        // Mostrar Pix
        function showPix() {
            document.getElementById('pixSection').classList.toggle('active');
        }

        // Copiar chave Pix
        function copyPix() {
            const pixKey = document.getElementById('pixKey').textContent.trim();
            navigator.clipboard.writeText(pixKey).then(() => {
                const msg = document.getElementById('copiedMsg');
                msg.classList.add('show');
                setTimeout(() => msg.classList.remove('show'), 2000);
            });
        }

        // Carrinho (simples)
        function toggleCart() {
            alert('Carrinho em desenvolvimento! Compre direto nos produtos.');
        }

        // Atualizar contador do carrinho
        function updateCartCount() {
            document.getElementById('cartCount').textContent = cart.length;
        }

        // Fechar modal ao clicar fora
        document.getElementById('paymentModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        // Inicializar
        renderProducts();
    </script>
</body>
</html>
