<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SixTiers - Minecraft Tier List</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        }

        body {
            background: #0a0000;
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid rgba(255, 0, 0, 0.15);
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: #ff0000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 900;
            color: #fff;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.3);
        }

        .logo-text {
            font-size: 24px;
            font-weight: 700;
            color: #fff;
        }

        .logo-text span {
            color: #ff0000;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .search-box input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 10px 16px;
            color: #fff;
            font-size: 14px;
            width: 250px;
            outline: none;
            transition: 0.3s;
        }

        .search-box input::placeholder {
            color: #666;
        }

        .search-box input:focus {
            border-color: #ff0000;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.1);
        }

        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #ff0000;
            font-size: 14px;
            font-weight: 500;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #ff0000;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        .refresh-btn {
            background: rgba(255, 0, 0, 0.15);
            border: 1px solid rgba(255, 0, 0, 0.3);
            color: #ff0000;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: 0.3s;
        }

        .refresh-btn:hover {
            background: rgba(255, 0, 0, 0.25);
            border-color: #ff0000;
        }

        .categories {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .category-btn {
            background: transparent;
            border: none;
            color: #666;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .category-btn:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.05);
        }

        .category-btn.active {
            color: #ff0000;
            background: rgba(255, 0, 0, 0.1);
        }

        .ranking-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .ranking-title {
            font-size: 20px;
            font-weight: 700;
            color: #fff;
        }

        .ranking-title small {
            color: #666;
            font-weight: 400;
            font-size: 14px;
        }

        .player-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 8px;
            transition: 0.3s;
            cursor: pointer;
        }

        .player-card:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 0, 0, 0.2);
            transform: translateX(4px);
        }

        .player-position {
            font-size: 18px;
            font-weight: 700;
            color: #444;
            min-width: 40px;
        }

        .player-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            overflow: hidden;
            flex-shrink: 0;
            border: 2px solid rgba(255, 0, 0, 0.2);
        }

        .player-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .player-avatar .fallback {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            font-size: 16px;
            font-weight: 700;
            color: #666;
        }

        .player-info {
            flex: 1;
            min-width: 0;
        }

        .player-name {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .player-name .points {
            color: #ff0000;
            font-weight: 700;
            font-size: 13px;
            background: rgba(255, 0, 0, 0.1);
            padding: 2px 10px;
            border-radius: 10px;
        }

        .player-time {
            color: #444;
            font-size: 12px;
            margin-top: 2px;
        }

        .player-tiers {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            flex-shrink: 0;
        }

        .tier-badge {
            padding: 2px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .tier-ht {
            background: rgba(255, 0, 0, 0.15);
            color: #ff0000;
            border: 1px solid rgba(255, 0, 0, 0.15);
        }

        .tier-lt {
            background: rgba(255, 100, 100, 0.1);
            color: #ff6666;
            border: 1px solid rgba(255, 100, 100, 0.1);
        }

        .tier-empty {
            color: #333;
            font-size: 12px;
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #444;
        }

        .loading-spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid rgba(255, 0, 0, 0.1);
            border-top: 3px solid #ff0000;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .update-badge {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid rgba(255, 0, 0, 0.2);
            color: #888;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            backdrop-filter: blur(10px);
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                align-items: stretch;
            }

            .header-right {
                flex-wrap: wrap;
            }

            .search-box input {
                width: 100%;
            }

            .player-card {
                flex-wrap: wrap;
                gap: 10px;
            }

            .player-tiers {
                width: 100%;
                justify-content: flex-start;
                padding-left: 56px;
            }

            .update-badge {
                bottom: 10px;
                right: 10px;
                font-size: 10px;
                padding: 4px 12px;
            }
        }

        @media (max-width: 480px) {
            .categories {
                justify-content: center;
            }

            .category-btn {
                font-size: 12px;
                padding: 6px 14px;
            }

            .player-position {
                min-width: 30px;
                font-size: 14px;
            }

            .player-name {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <header class="header">
            <a href="/" class="logo">
                <div class="logo-icon">6</div>
                <div class="logo-text">Six<span>Tiers</span></div>
            </a>
            <div class="header-right">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Buscar jogador..." onkeypress="if(event.key==='Enter')searchPlayer()">
                </div>
                <button class="refresh-btn" onclick="loadRanking(currentCategory)">🔄 Atualizar</button>
                <div class="status">
                    <span class="status-dot"></span>
                    Online
                </div>
            </div>
        </header>

        <!-- CATEGORIAS -->
        <nav class="categories" id="categories">
            <button class="category-btn active" data-cat="overall">🏆 Overall</button>
            <button class="category-btn" data-cat="sword">⚔️ Sword</button>
            <button class="category-btn" data-cat="axe">🪓 Axe</button>
            <button class="category-btn" data-cat="crystal">💎 Crystal</button>
            <button class="category-btn" data-cat="elytra">🦅 Elytra</button>
            <button class="category-btn" data-cat="mace">🔨 Mace</button>
            <button class="category-btn" data-cat="ogv">⚡ OGV</button>
            <button class="category-btn" data-cat="trident">🔱 Trident</button>
        </nav>

        <!-- RANKING -->
        <div class="ranking-header">
            <div class="ranking-title">Ranking <small>— Top jogadores</small></div>
        </div>

        <div id="rankingList">
            <div class="loading">
                <div class="loading-spinner"></div>
                <div>Carregando ranking...</div>
            </div>
        </div>
    </div>

    <div class="update-badge" id="updateBadge">🔄 Atualização automática a cada 30s</div>

    <script>
        // ============================================================
        // 🔥 CONFIGURAÇÕES
        // ============================================================
        const SUPABASE_URL = 'https://ucoqonyzmckwnktdtfrg.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_AF-JxbMVdy5bxlDQcFdVaA_rmfuk8bj';

        let currentCategory = 'overall';
        let updateInterval = null;

        // ============================================================
        // 🔥 SISTEMA DE PONTOS
        // ============================================================
        const TIER_POINTS = {
            'LT5': 1,
            'HT5': 2,
            'LT4': 3,
            'HT4': 4,
            'LT3': 6,
            'HT3': 8,
            'LT2': 10,
            'HT2': 12,
            'LT1': 15,
            'HT1': 20
        };

        function getTierPoints(tier) {
            if (!tier) return 0;
            return TIER_POINTS[tier.toUpperCase()] || 0;
        }

        function calculateOverallPoints(player) {
            const categories = [
                'overall_tier', 'sword_tier', 'axe_tier', 'crystal_tier',
                'elytra_tier', 'mace_tier', 'ogv_tier', 'trident_tier'
            ];
            let total = 0;
            categories.forEach(cat => {
                const tier = player[cat];
                if (tier) total += getTierPoints(tier);
            });
            return total;
        }

        // ============================================================
        // 🔥 MAPEAMENTO
        // ============================================================
        const categoryDbMap = {
            'overall': 'overall_tier',
            'sword': 'sword_tier',
            'axe': 'axe_tier',
            'crystal': 'crystal_tier',
            'elytra': 'elytra_tier',
            'mace': 'mace_tier',
            'ogv': 'ogv_tier',
            'trident': 'trident_tier'
        };

        const categoryEmojis = {
            'overall_tier': '🏆',
            'sword_tier': '⚔️',
            'axe_tier': '🪓',
            'crystal_tier': '💎',
            'elytra_tier': '🦅',
            'mace_tier': '🔨',
            'ogv_tier': '⚡',
            'trident_tier': '🔱'
        };

        // ============================================================
        // 🔥 FUNÇÕES
        // ============================================================
        function searchPlayer() {
            const username = document.getElementById('searchInput').value.trim();
            if (username) {
                window.location.href = `/player/${username}`;
            }
        }

        function timeSince(date) {
            const now = new Date();
            const diff = Math.floor((now - date) / 1000);

            if (diff < 60) return 'agora mesmo';
            if (diff < 3600) return `${Math.floor(diff / 60)}min atrás`;
            if (diff < 86400) return `${Math.floor(diff / 3600)}h atrás`;
            if (diff < 2592000) return `${Math.floor(diff / 86400)}d atrás`;
            if (diff < 31536000) return `${Math.floor(diff / 2592000)}m atrás`;
            return `${Math.floor(diff / 31536000)}a atrás`;
        }

        function getSkinUrl(username) {
            return `https://crafatar.com/avatars/${username}?overlay&size=40`;
        }

        // ============================================================
        // 🔥 CARREGAR RANKING (COM TIMESTAMP PARA EVITAR CACHE)
        // ============================================================
        async function loadRanking(category) {
            const list = document.getElementById('rankingList');
            list.innerHTML = `
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <div>Carregando ranking...</div>
                </div>
            `;

            try {
                const timestamp = Date.now();
                const response = await fetch(
                    `${SUPABASE_URL}/rest/v1/players?select=*&limit=200&_=${timestamp}`,
                    {
                        headers: {
                            'apikey': SUPABASE_KEY,
                            'Authorization': `Bearer ${SUPABASE_KEY}`
                        }
                    }
                );

                if (!response.ok) throw new Error('Erro ao carregar');

                const data = await response.json();

                let sorted = [];

                if (category === 'overall') {
                    const withPoints = data.map(player => ({
                        ...player,
                        overall_points: calculateOverallPoints(player)
                    }));
                    const filtered = withPoints.filter(p => p.overall_points > 0);
                    filtered.sort((a, b) => b.overall_points - a.overall_points);
                    sorted = filtered;
                } else {
                    const dbField = categoryDbMap[category];
                    const filtered = data.filter(p => p[dbField] !== null && p[dbField] !== undefined);
                    filtered.sort((a, b) => {
                        const tierA = a[dbField] || '';
                        const tierB = b[dbField] || '';
                        const getWeight = (tier) => {
                            if (!tier) return 0;
                            const num = parseInt(tier.match(/\d+/)?.[0] || 0);
                            const isHT = tier.startsWith('HT');
                            return isHT ? (100 + num) : num;
                        };
                        return getWeight(tierB) - getWeight(tierA);
                    });
                    sorted = filtered;
                }

                if (sorted.length === 0) {
                    list.innerHTML = `
                        <div style="text-align:center;padding:60px 20px;color:#444;">
                            <div style="font-size:48px;margin-bottom:15px;">📭</div>
                            <p>Nenhum tier registrado nesta categoria ainda.</p>
                        </div>
                    `;
                    return;
                }

                const top = sorted.slice(0, 20);

                const allCats = [
                    'overall_tier', 'sword_tier', 'axe_tier', 'crystal_tier',
                    'elytra_tier', 'mace_tier', 'ogv_tier', 'trident_tier'
                ];

                list.innerHTML = top.map((player, index) => {
                    const tiersHTML = allCats.map(catKey => {
                        const tier = player[catKey];
                        if (!tier) return '';
                        const cls = tier.startsWith('HT') ? 'tier-ht' : 'tier-lt';
                        const emoji = categoryEmojis[catKey] || '';
                        return `<span class="tier-badge ${cls}">${emoji} ${tier}</span>`;
                    }).filter(Boolean).join('');

                    const timeAgo = player.updated_at ? timeSince(new Date(player.updated_at)) : 'Nunca';
                    const initial = player.minecraft_username.charAt(0).toUpperCase();
                    const skinUrl = player.skin_url || getSkinUrl(player.minecraft_username);

                    let pointsDisplay = '';
                    if (category === 'overall' && player.overall_points) {
                        pointsDisplay = `<span class="points">${player.overall_points} pts</span>`;
                    }

                    return `
                        <div class="player-card" onclick="window.location.href='/player/${player.minecraft_username}'">
                            <div class="player-position">#${index + 1}</div>
                            <div class="player-avatar">
                                <img src="${skinUrl}" 
                                     alt="${player.minecraft_username}" 
                                     onerror="this.style.display='none';this.parentElement.innerHTML='<span class=\\'fallback\\'>${initial}</span>'">
                            </div>
                            <div class="player-info">
                                <div class="player-name">
                                    ${player.minecraft_username}
                                    ${pointsDisplay}
                                </div>
                                <div class="player-time">🕐 ${timeAgo}</div>
                            </div>
                            <div class="player-tiers">
                                ${tiersHTML || '<span class="tier-empty">Sem tiers</span>'}
                            </div>
                        </div>
                    `;
                }).join('');

                // Atualiza o badge com o horário
                document.getElementById('updateBadge').textContent = `🔄 Atualizado: ${new Date().toLocaleTimeString()}`;

            } catch (error) {
                console.error('Erro:', error);
                list.innerHTML = `
                    <div style="text-align:center;padding:60px 20px;color:#ff3333;">
                        <div style="font-size:48px;margin-bottom:15px;">❌</div>
                        <p>Erro ao carregar ranking. Tente novamente.</p>
                    </div>
                `;
            }
        }

        // ============================================================
        // 🔥 EVENTOS DAS CATEGORIAS
        // ============================================================
        document.querySelectorAll('.category-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentCategory = this.dataset.cat;
                loadRanking(currentCategory);
            });
        });

        // ============================================================
        // 🔥 INICIALIZAÇÃO COM ATUALIZAÇÃO AUTOMÁTICA
        // ============================================================
        loadRanking('overall');

        // Atualiza a cada 30 segundos
        updateInterval = setInterval(() => {
            loadRanking(currentCategory);
        }, 30000);

        // Limpa o intervalo quando a página for fechada
        window.addEventListener('beforeunload', () => {
            clearInterval(updateInterval);
        });
    </script>
</body>
</html>
