<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SixTiers - Sistema de Tiers</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0a0000;
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            max-width: 600px;
            width: 100%;
            padding: 20px;
        }

        .card {
            background: rgba(20, 0, 0, 0.95);
            border-radius: 20px;
            padding: 50px 40px;
            border: 2px solid rgba(255, 0, 0, 0.3);
            box-shadow: 0 25px 50px rgba(255, 0, 0, 0.1);
            text-align: center;
        }

        .logo-big {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #ff0000, #cc0000);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 72px;
            font-weight: 900;
            color: white;
            margin: 0 auto 20px;
            box-shadow: 0 0 60px rgba(255, 0, 0, 0.3);
            border: 3px solid rgba(255, 0, 0, 0.5);
        }

        h1 {
            font-size: 48px;
            color: #ff0000;
            text-shadow: 0 0 30px rgba(255, 0, 0, 0.3);
            margin-bottom: 10px;
            letter-spacing: 3px;
        }

        .subtitle {
            color: #882222;
            font-size: 18px;
            margin-bottom: 30px;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .search-box input {
            flex: 1;
            padding: 15px 20px;
            background: rgba(255, 0, 0, 0.05);
            border: 1px solid rgba(255, 0, 0, 0.2);
            border-radius: 10px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
        }

        .search-box input:focus {
            border-color: #ff0000;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.1);
        }

        .search-box input::placeholder {
            color: #442222;
        }

        .search-box button {
            padding: 15px 30px;
            background: linear-gradient(135deg, #ff0000, #cc0000);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .search-box button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(255, 0, 0, 0.3);
        }

        .features {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin-top: 30px;
        }

        .feature {
            background: rgba(255, 0, 0, 0.05);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid rgba(255, 0, 0, 0.1);
        }

        .feature span {
            font-size: 24px;
            display: block;
            margin-bottom: 5px;
        }

        .feature p {
            color: #882222;
            font-size: 12px;
        }

        @media (max-width: 500px) {
            .search-box {
                flex-direction: column;
            }
            
            .features {
                grid-template-columns: 1fr;
            }
            
            h1 {
                font-size: 36px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="logo-big">6</div>
            <h1>SIXTIERS</h1>
            <div class="subtitle">🔥 Sistema de Tiers para Minecraft</div>
            
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Digite o nome do jogador...">
                <button onclick="searchPlayer()">Buscar</button>
            </div>

            <div class="features">
                <div class="feature">
                    <span>⚔️</span>
                    <p>Rankings em 8 categorias</p>
                </div>
                <div class="feature">
                    <span>🏆</span>
                    <p>Sistema HT/LT</p>
                </div>
                <div class="feature">
                    <span>📊</span>
                    <p>Atualização via Discord</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function searchPlayer() {
            const username = document.getElementById('searchInput').value.trim();
            if (username) {
                window.location.href = `/player/${username}`;
            }
        }

        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchPlayer();
            }
        });
    </script>
</body>
</html>
