<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📰 Jornal do Minezinho - Minecraft News</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-area">
                <img src="imagens/logo-minezinho.png" alt="Logo do Minezinho" class="logo" onerror="this.style.display='none'">
                <h1>📰 JORNAL DO MINEZINHO</h1>
            </div>
            <p>As notícias mais quentes do servidor!</p>
            <div class="data-atual" id="dataAtual"></div>
        </header>

        <div class="botoes">
            <button class="ativo" onclick="mostrarJornal('dia')">📅 JORNAL DO DIA</button>
            <button onclick="mostrarJornal('semana')">📆 JORNAL DA SEMANA</button>
        </div>

        <div id="conteudoJornal" class="jornal-container">
            <!-- Aqui vai aparecer o jornal -->
        </div>

        <footer>
            <div class="redes-sociais">
                <a href="https://www.instagram.com/minezinhoservidor" target="_blank" class="social-link instagram">
                    📷 Instagram: @minezinhoservidor
                </a>
                <a href="https://discord.gg/minezinho" target="_blank" class="social-link discord">
                    💬 Discord: discord.gg/minezinho
                </a>
            </div>
            <p class="footer-text">🗳️ Envie sua notícia no Discord | Use #jornal</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
