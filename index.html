<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SixTiers - Minecraft Tier List</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #0a0000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            width: 100%;
        }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid rgba(255, 0, 0, 0.15);
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-circle {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #ff0000, #cc0000);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 900;
            color: white;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.3);
        }

        .logo-text {
            font-size: 28px;
            font-weight: 800;
            color: #ff0000;
            letter-spacing: 1px;
        }

        .logo-text span {
            color: #882222;
            font-weight: 400;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .search-input {
            background: rgba(255, 0, 0, 0.05);
            border: 1px solid rgba(255, 0, 0, 0.15);
            border-radius: 8px;
            padding: 10px 16px;
            color: white;
            font-size: 14px;
            width: 220px;
            outline: none;
            transition: all 0.3s;
        }

        .search-input:focus {
            border-color: #ff0000;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.1);
        }

        .search-input::placeholder {
            color: #552222;
        }

        .status-online {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #ff0000;
            font-size: 14px;
            font-weight: 600;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background: #ff0000;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* ===== CATEGORIAS ===== */
        .categories {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(255, 0, 0, 0.1);
            padding-bottom: 15px;
        }

        .category-btn {
            background: transparent;
            border: none;
            color: #882222;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .category-btn:hover {
            color: #ff3333;
            background: rgba(255, 0, 0, 0.05);
        }

        .category-btn.active {
            color: #ff0000;
            background: rgba(255, 0, 0, 0.1);
            box-shadow: inset 0 0 20px rgba(255, 0, 0, 0.05);
        }

        /* ===== RANKING ===== */
        .ranking-title {
            font-size: 24px;
            font-weight: 700;
            color: white;
            margin-bottom: 20px;
        }

        .ranking-title small {
            color: #882222;
            font-weight: 400;
            font-size: 16px;
        }

        .player-card {
            background: rgba(20, 0, 0, 0.6);
            border: 1px solid rgba(255, 0, 0, 0.1);
            border-radius: 12px;
            padding: 18px 24px;
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 10px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .player-card:hover {
            background: rgba(255, 0, 0, 0.05);
            border-color: rgba(255, 0, 0, 0.2);
            transform: translateX(5px);
        }

        .player-position {
            font-size: 20px;
            font-weight: 700;
            color: #882222;
            min-width: 40px;
        }

        .player-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff0000, #cc0000);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: white;
            font-weight: 700;
        }

        .player-info {
            flex: 1;
        }

        .player-name {
            font-size: 18px;
            font-weight: 600;
            color: white;
        }

        .player-name small {
            color: #882222;
            font-weight: 400;
            font-size: 14px;
        }

        .player-time {
            color: #552222;
            font-size: 13px;
        }

        .player-tiers {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .tier-badge {
            padding: 2px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .tier-ht {
            background: rgba(255, 0, 0, 0.2);
            color: #ff0000;
            border: 1px solid rgba(255, 0, 0, 0.2);
        }

        .tier-lt {
            background: rgba(255, 100, 100, 0.15);
            color: #ff6666;
            border: 1px solid rgba(255, 100, 100, 0.15);
        }

        .tier-empty {
            color: #442222;
            font-size: 12px;
        }

        /* ===== RESPONSIVO ===== */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                align-items: stretch;
                gap: 10px;
            }

            .header-right {
                flex-wrap: wrap;
            }

            .search-input {
                width: 100%;
            }

            .player-card {
                flex-wrap: wrap;
                gap: 10px;
            }

            .player-tiers {
                width: 100%;
                justify-content: flex-start;
            }

            .categories {
                justify-content: center;
            }
        }

        @media (max-width: 480px) {
            .logo-text {
                font-size: 22px;
            }

            .player-position {
                min-width: 30px;
                font-size: 16px;
            }

            .player-name {
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <header class="header">
            <div class="logo-area">
                <div class="logo-circle">6</div>
                <div class="logo-text">Six<span>Tiers</span></div>
            </div>
            <div class="header-right">
                <input class="search-input" id="searchInput" placeholder="Buscar jogador..." onkeypress="if(event.key==='Enter')searchPlayer()">
                <div class="status-online">
                    <span class="status-dot"></span>
                    Online
                </div>
            </div>
        </header>

        <!-- CATEGORIAS -->
        <nav class="categories">
            <button class="category-btn active" data-cat="overall">🏆 Overall</button>
            <button class="category-btn" data-cat="sword">⚔️ Sword</button>
            <button class="category-btn" data-cat="axe">🪓 Axe</button>
            <button class="category-btn" data-cat="crystal">💎 Crystal</button>
            <button class="category-btn" data-cat="elytra">🦅 Elytra</button>
            <button class="category-btn" data-cat="mace">🔨 Mace</button>
            <button class="category-btn" data-cat="ogv">⚡ OGV</button>
            <button class="category-btn" data-cat="trident">🔱 Trident</button>
        </nav>

        <!-- RANKING -->
        <div class="ranking-title">
            Ranking <small>— Top jogadores</small>
        </div>
        <div id="rankingList">
            <div style="text-align:center;color:#552222;padding:40px;">Carregando ranking...</div>
        </div>
    </div>

    <script>
        // ===== CONFIGURAÇÕES =====
        const SUPABASE_URL = 'https://ucoqonyzmckwnktdtfrg.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_AF-JxbMWdy5bxLDQcFdVaA_rmfuk...';

        let currentCategory = 'overall_tier';

        // ===== BUSCAR JOGADOR =====
        function searchPlayer() {
            const username = document.getElementById('searchInput').value.trim();
            if (username) {
                window.location.href = `/player/${username}`;
            }
        }

        // ===== CARREGAR RANKING =====
        async function loadRanking(category) {
            const list = document.getElementById('rankingList');
            list.innerHTML = '<div style="text-align:center;color:#552222;padding:40px;">Carregando...</div>';

            try {
                const response = await fetch(
                    `${SUPABASE_URL}/rest/v1/players?select=*&order=${category}.desc.nullsfirst&limit=20`,
                    {
                        headers: {
                            'apikey': SUPABASE_KEY,
                            'Authorization': `Bearer ${SUPABASE_KEY}`
                        }
                    }
                );

                if (!response.ok) throw new Error('Erro ao carregar');

                const data = await response.json();

                if (data.length === 0) {
                    list.innerHTML = '<div style="text-align:center;color:#552222;padding:40px;">Nenhum jogador registrado ainda.</div>';
                    return;
                }

                // Filtra quem tem tier na categoria
                const filtered = data.filter(p => p[category] !== null && p[category] !== undefined);
                
                if (filtered.length === 0) {
                    list.innerHTML = '<div style="text-align:center;color:#552222;padding:40px;">Nenhum tier registrado nesta categoria.</div>';
                    return;
                }

                // Ordena por tier (HT > LT)
                filtered.sort((a, b) => {
                    const tierA = a[category] || '';
                    const tierB = b[category] || '';
                    const order = { 'HT': 1, 'LT': 2 };
                    const numA = parseInt(tierA.match(/\d+/)?.[0] || 0);
                    const numB = parseInt(tierB.match(/\d+/)?.[0] || 0);
                    const typeA = tierA.startsWith('HT') ? order.HT : (tierA.startsWith('LT') ? order.LT : 99);
                    const typeB = tierB.startsWith('HT') ? order.HT : (tierB.startsWith('LT') ? order.LT : 99);
                    if (typeA !== typeB) return typeA - typeB;
                    return numB - numA;
                });

                // Pega o top 10
                const top = filtered.slice(0, 10);

                // Categorias para exibir nos badges
                const allCats = [
                    { key: 'overall_tier', label: 'Overall' },
                    { key: 'sword_tier', label: 'Sword' },
                    { key: 'axe_tier', label: 'Axe' },
                    { key: 'crystal_tier', label: 'Crystal' },
                    { key: 'elytra_tier', label: 'Elytra' },
                    { key: 'mace_tier', label: 'Mace' },
                    { key: 'ogv_tier', label: 'OGV' },
                    { key: 'trident_tier', label: 'Trident' }
                ];

                list.innerHTML = top.map((player, index) => {
                    // Pega todos os tiers do jogador
                    const tiersHTML = allCats.map(cat => {
                        const tier = player[cat.key];
                        if (!tier) return '';
                        const cls = tier.startsWith('HT') ? 'tier-ht' : 'tier-lt';
                        return `<span class="tier-badge ${cls}">${tier}</span>`;
                    }).filter(Boolean).join('');

                    const timeAgo = player.updated_at ? timeSince(new Date(player.updated_at)) : 'Nunca';

                    return `
                        <div class="player-card" onclick="window.location.href='/player/${player.minecraft_username}'">
                            <div class="player-position">#${index + 1}</div>
                            <div class="player-avatar">${player.minecraft_username.charAt(0).toUpperCase()}</div>
                            <div class="player-info">
                                <div class="player-name">${player.minecraft_username} <small>${player.discord_id}</small></div>
                                <div class="player-time">🕐 ${timeAgo}</div>
                            </div>
                            <div class="player-tiers">
                                ${tiersHTML || '<span class="tier-empty">Sem tiers</span>'}
                            </div>
                        </div>
                    `;
                }).join('');

            } catch (error) {
                console.error('Erro:', error);
                list.innerHTML = '<div style="text-align:center;color:#ff3333;padding:40px;">❌ Erro ao carregar ranking</div>';
            }
        }

        // ===== FUNÇÃO DE TEMPO =====
        function timeSince(date) {
            const now = new Date();
            const diff = Math.floor((now - date) / 1000);
            
            const intervals = [
                { label: 'ano', seconds: 31536000 },
                { label: 'mês', seconds: 2592000 },
                { label: 'dia', seconds: 86400 },
                { label: 'hora', seconds: 3600 },
                { label: 'min', seconds: 60 }
            ];

            for (const interval of intervals) {
                const count = Math.floor(diff / interval.seconds);
                if (count >= 1) {
                    return `${count} ${interval.label}${count > 1 ? 's' : ''} atrás`;
                }
            }
            return 'agora mesmo';
        }

        // ===== EVENTOS DAS CATEGORIAS =====
        document.querySelectorAll('.category-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                
                const catMap = {
                    'overall': 'overall_tier',
                    'sword': 'sword_tier',
                    'axe': 'axe_tier',
                    'crystal': 'crystal_tier',
                    'elytra': 'elytra_tier',
                    'mace': 'mace_tier',
                    'ogv': 'ogv_tier',
                    'trident': 'trident_tier'
                };
                currentCategory = catMap[this.dataset.cat] || 'overall_tier';
                loadRanking(currentCategory);
            });
        });

        // ===== INICIALIZA =====
        loadRanking('overall_tier');
    </script>
</body>
</html>
